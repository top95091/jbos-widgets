<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관심 종목</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:#fff; padding:14px;}
  .card{height:100%; min-height:220px; background:#fff; border:1px solid #ececec;
    border-radius:16px; padding:14px 16px 8px; display:flex; flex-direction:column;}
  .title{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .title .t{font-size:15px; font-weight:700; letter-spacing:-.2px; color:#1a1a1a;}
  .title .t .dot{color:#5a1f1f; margin-right:6px;}
  .title .tag{font-size:11px; color:#8a8a8a;}
  .tv{flex:1; min-height:0;}
  .tradingview-widget-container,.tradingview-widget-container__widget{height:100%; width:100%;}
</style>
</head>
<body>
  <div class="card">
    <div class="title"><div class="t"><span class="dot">●</span>관심 종목</div><div class="tag">실시간 · TradingView</div></div>
    <div class="tv">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <!-- ▼▼▼ 종목 편집: 아래 "symbols" 목록만 고치면 됩니다 ▼▼▼
             형식:  {"s": "KRX:종목코드", "d": "표시이름"}
             예)   삼성전자 005930 → {"s":"KRX:005930","d":"삼성전자"}
                   미국주식 애플   → {"s":"NASDAQ:AAPL","d":"애플"}
                   테슬라        → {"s":"NASDAQ:TSLA","d":"테슬라"}
             콤마(,)로 구분하고, 마지막 항목 뒤에는 콤마를 넣지 마세요. -->
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
        {
          "colorTheme": "light",
          "dateRange": "1D",
          "showChart": true,
          "locale": "kr",
          "isTransparent": true,
          "showSymbolLogo": true,
          "showFloatingTooltip": true,
          "width": "100%",
          "height": "100%",
          "plotLineColorGrowing": "rgba(224,49,49,1)",
          "plotLineColorFalling": "rgba(28,126,214,1)",
          "gridLineColor": "rgba(240,240,240,1)",
          "scaleFontColor": "rgba(120,120,120,1)",
          "belowLineFillColorGrowing": "rgba(224,49,49,0.08)",
          "belowLineFillColorFalling": "rgba(28,126,214,0.08)",
          "belowLineFillColorGrowingBottom": "rgba(224,49,49,0)",
          "belowLineFillColorFallingBottom": "rgba(28,126,214,0)",
          "symbolActiveColor": "rgba(90,31,31,0.08)",
          "tabs": [
            {
              "title": "관심 종목",
              "symbols": [
                {"s": "KRX:005930", "d": "삼성전자"},
                {"s": "KRX:000660", "d": "SK하이닉스"},
                {"s": "KRX:082920", "d": "비츠로셀"}
              ]
            }
          ]
        }
        </script>
        <!-- ▲▲▲ 종목 편집 끝 ▲▲▲ -->
      </div>
    </div>
  </div>
</body>
</html>
